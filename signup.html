<!doctype html>
<html lang="zh-Hans">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up · MyVibe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet" href="../assets/css/styles.css" />
  </head>
  <body data-page="signup" class="app-bg min-h-screen bg-slate-50 text-slate-900">
    <div class="mx-auto flex min-h-screen w-[94vw] max-w-[1600px] items-center px-6 py-16">
      <div class="grid w-full items-center gap-10 lg:grid-cols-2">
        <section>
          <a href="../index.html" class="text-sm font-semibold text-slate-700 hover:text-slate-900">← Back</a>
          <h1 class="mt-6 text-4xl font-semibold tracking-tight sm:text-5xl">Create account</h1>
          <p class="mt-4 max-w-xl text-base leading-7 text-slate-700">
            Basic signup form with simple mock validation.
          </p>

          <div class="mt-8 rounded-2xl border border-slate-200 bg-white/70 p-5 shadow-sm backdrop-blur">
            <div class="text-sm font-semibold text-slate-900">Password rules</div>
            <ul class="mt-2 space-y-1 text-sm text-slate-700">
              <li>- At least 6 characters</li>
              <li>- Confirm password must match</li>
            </ul>
          </div>
        </section>

        <section class="lg:justify-self-end">
          <div class="w-full max-w-md rounded-3xl border border-slate-200 bg-white/70 p-6 shadow-md backdrop-blur">
            <div class="flex items-center justify-between">
              <div>
                <div class="text-sm font-semibold text-slate-900">Sign up</div>
                <div class="mt-1 text-sm text-slate-600">Auto-login after signup (mock)</div>
              </div>
              <div class="rounded-2xl bg-slate-900 px-3 py-1 text-xs font-semibold text-white">Mock</div>
            </div>

            <form id="signupForm" class="mt-6 space-y-4">
              <div>
                <label for="suEmail" class="text-sm font-medium text-slate-700">Email / Username</label>
                <input
                  id="suEmail"
                  name="suEmail"
                  autocomplete="username"
                  placeholder="mina"
                  class="mt-2 w-full rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm text-slate-900 shadow-sm outline-none ring-sky-500/30 focus:ring-4"
                />
              </div>
              <div>
                <label for="suPassword" class="text-sm font-medium text-slate-700">Password</label>
                <input
                  id="suPassword"
                  name="suPassword"
                  type="password"
                  autocomplete="new-password"
                  placeholder="At least 6 characters"
                  class="mt-2 w-full rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm text-slate-900 shadow-sm outline-none ring-sky-500/30 focus:ring-4"
                />
              </div>
              <div>
                <label for="suPassword2" class="text-sm font-medium text-slate-700">Confirm password</label>
                <input
                  id="suPassword2"
                  name="suPassword2"
                  type="password"
                  autocomplete="new-password"
                  placeholder="Type again"
                  class="mt-2 w-full rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm text-slate-900 shadow-sm outline-none ring-sky-500/30 focus:ring-4"
                />
              </div>

              <button
                type="submit"
                class="w-full rounded-xl bg-slate-900 px-4 py-3 text-sm font-semibold text-white shadow-sm transition hover:bg-slate-800"
              >
                Sign up and continue
              </button>

              <div class="text-center text-xs text-slate-600">
                Already have an account? <a class="font-semibold text-sky-700 hover:text-sky-800" href="./login.html">Login</a>
              </div>
            </form>
          </div>
        </section>
      </div>
    </div>

    <div
      id="toast"
      class="toast fixed bottom-6 left-1/2 z-50 w-[min(92vw,420px)] -translate-x-1/2 rounded-2xl px-4 py-3 text-sm font-medium text-white shadow-lg"
    >
      <div class="flex items-center justify-between gap-3">
        <div data-toast-text>—</div>
        <button
          type="button"
          class="rounded-xl bg-white/15 px-3 py-1 text-xs font-semibold text-white hover:bg-white/20"
          onclick="document.getElementById('toast').classList.remove('is-visible')"
        >
          Close
        </button>
      </div>
    </div>

    <script src="../assets/js/interactions.js"></script>
    <script src="../assets/js/pages/signup.js"></script>
  </body>
</html>
