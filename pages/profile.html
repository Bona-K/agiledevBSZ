<!doctype html>
<html lang="zh-Hans">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile · MyVibe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet" href="../assets/css/styles.css" />
  </head>
  <body data-page="profile" class="app-bg min-h-screen bg-slate-50 text-slate-900">
    <header class="app-header sticky top-0 z-40 bg-white/70 backdrop-blur">
      <div class="mx-auto flex w-[94vw] max-w-[1600px] items-center justify-between px-6 py-4">
        <a href="../index.html" class="text-2xl brand-text">MyVibe</a>

        <nav class="hidden items-center gap-1 sm:flex">
          <a
            href="./dashboard.html"
            class="rounded-xl px-3 py-2 text-sm font-semibold text-slate-700 hover:bg-white hover:text-slate-900"
            >Home</a
          >
          <a
            href="./explore.html"
            class="rounded-xl px-3 py-2 text-sm font-semibold text-slate-700 hover:bg-white hover:text-slate-900"
            >Explore</a
          >
          <a
            href="./create-route.html"
            class="rounded-xl px-3 py-2 text-sm font-semibold text-slate-700 hover:bg-white hover:text-slate-900"
            >Create</a
          >
          <a href="./profile.html" class="rounded-xl bg-slate-900 px-3 py-2 text-sm font-semibold text-white">Profile</a>
        </nav>

        <div class="flex items-center gap-3">
          <button
            data-action="logout"
            class="rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm font-semibold text-slate-700 shadow-sm hover:bg-slate-50"
          >
            Logout
          </button>
        </div>
      </div>
    </header>

    <main class="mx-auto w-[94vw] max-w-[1600px] px-6 py-10">
      <section class="grid gap-6 lg:grid-cols-[360px,1fr]">
        <aside class="rounded-3xl border border-slate-200 bg-white/70 p-6 shadow-md backdrop-blur">
          <div class="flex items-start gap-4">
            <div
              id="profileInitials"
              class="flex h-14 w-14 items-center justify-center rounded-2xl bg-slate-900 text-base font-semibold text-white"
            >
              —
            </div>
            <div class="min-w-0">
              <div id="profileName" class="truncate text-lg font-semibold text-slate-900">—</div>
              <div id="profileUsername" class="truncate text-sm font-semibold text-slate-600">—</div>
              <div class="mt-2 text-xs font-semibold text-slate-500">Joined: <span id="profileJoined">—</span></div>
            </div>
          </div>

          <div class="mt-5 rounded-2xl bg-slate-50 p-4">
            <div class="text-xs font-semibold text-slate-600">Bio</div>
            <div id="profileBio" class="mt-2 text-sm leading-6 text-slate-700">—</div>
          </div>

          <div class="mt-5 flex flex-col gap-2">
            <a
              href="./dashboard.html"
              class="inline-flex items-center justify-center rounded-xl bg-slate-900 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-slate-800"
              >Back to Home</a
            >
          </div>
        </aside>

        <section>
          <div class="rounded-3xl border border-slate-200 bg-white/70 p-6 shadow-sm backdrop-blur">
            <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
              <div>
                <h1 class="text-2xl font-semibold tracking-tight text-slate-900">My Page</h1>
                <p class="mt-1 text-sm text-slate-600">Tabbed profile layout</p>
              </div>
              <a
                href="./create-route.html"
                class="inline-flex items-center justify-center rounded-xl bg-slate-900 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-slate-800"
                >Create route</a
              >
            </div>

            <div class="mt-5 flex flex-wrap gap-2">
              <button data-tab="my" class="tabBtn rounded-xl bg-slate-900 px-4 py-2 text-sm font-semibold text-white">My Routes</button>
              <button data-tab="saved" class="tabBtn rounded-xl border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-800 hover:bg-slate-50">Saved Routes</button>
              <button data-tab="locations" class="tabBtn rounded-xl border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-800 hover:bg-slate-50">My Locations</button>
              <button data-tab="settings" class="tabBtn rounded-xl border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-800 hover:bg-slate-50">Settings</button>
            </div>
          </div>

          <section data-tab-panel="my" class="mt-4">
            <h2 class="text-lg font-semibold text-slate-900">My routes</h2>
            <div id="myRoutesGrid" class="mt-3 grid gap-3 sm:grid-cols-2"></div>
          </section>

          <section data-tab-panel="saved" class="mt-4 hidden">
            <h2 class="text-lg font-semibold text-slate-900">Saved routes</h2>
            <div id="savedRoutesGrid" class="mt-3 grid gap-3 sm:grid-cols-2"></div>
          </section>

          <section data-tab-panel="locations" class="mt-4 hidden">
            <h2 class="text-lg font-semibold text-slate-900">My locations</h2>
            <div id="myLocationsGrid" class="mt-3 grid gap-3 sm:grid-cols-2"></div>
          </section>

          <section data-tab-panel="settings" class="mt-4 hidden">
            <h2 class="text-lg font-semibold text-slate-900">Settings (mock)</h2>
            <div class="mt-3 rounded-3xl border border-slate-200 bg-white/70 p-6 shadow-sm backdrop-blur">
              <div class="text-sm font-semibold text-slate-900">Change password (optional)</div>
              <p class="mt-1 text-sm text-slate-600">Form only</p>

              <div class="mt-4 grid gap-3 sm:grid-cols-3">
                <input
                  class="w-full rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm text-slate-900 shadow-sm outline-none ring-sky-500/30 focus:ring-4"
                  placeholder="Old password"
                  type="password"
                />
                <input
                  class="w-full rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm text-slate-900 shadow-sm outline-none ring-sky-500/30 focus:ring-4"
                  placeholder="New password"
                  type="password"
                />
                <input
                  class="w-full rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm text-slate-900 shadow-sm outline-none ring-sky-500/30 focus:ring-4"
                  placeholder="Confirm"
                  type="password"
                />
              </div>
              <button
                type="button"
                class="mt-3 rounded-xl border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-900 shadow-sm hover:bg-slate-50"
              >
                Save（mock）
              </button>

              <div class="mt-6 border-t border-slate-200 pt-4">
                <button
                  data-action="logout"
                  class="rounded-xl bg-slate-900 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-slate-800"
                  type="button"
                >
                  Logout
                </button>
              </div>
            </div>
          </section>
        </section>
      </section>
    </main>

    <script src="../assets/js/interactions.js"></script>
    <script src="../assets/js/pages/profile.js"></script>
  </body>
</html>
